<svg xmlns="http://www.w3.org/2000/svg" width="360" height="92" viewBox="0 0 360 92" role="img" aria-labelledby="title desc">
  <title id="title">KitchenDiary Logo</title>
  <desc id="desc">Rounded badge with pot and steam icon followed by KitchenDiary wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="8%" y1="5%" x2="92%" y2="95%">
      <stop offset="0%" stop-color="#fff8eb"/>
      <stop offset="100%" stop-color="#ffe7c7"/>
    </linearGradient>
    <linearGradient id="pot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="steam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="360" height="92" rx="16" fill="none"/>

  <g transform="translate(8,8)">
    <rect x="0" y="0" width="76" height="76" rx="20" fill="url(#bg)"/>
    <rect x="17" y="34" width="42" height="18" rx="8" fill="url(#pot)"/>
    <rect x="14" y="30" width="48" height="7" rx="3.5" fill="#8a3f08"/>
    <path d="M26 26c4-4 2-8 0-11" stroke="url(#steam)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M38 24c4-5 2-10 0-14" stroke="url(#steam)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M50 26c4-4 2-8 0-11" stroke="url(#steam)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="58" cy="19" r="4.5" fill="#fff1dc" stroke="#efb977"/>
  </g>

  <g transform="translate(96,18)">
    <text x="0" y="28" font-family="Segoe UI, Trebuchet MS, sans-serif" font-size="34" font-weight="700" fill="#172b3f">KitchenDiary</text>
    <text x="2" y="50" font-family="Segoe UI, Trebuchet MS, sans-serif" font-size="12.5" font-weight="600" letter-spacing="0.7" fill="#8a4b0f">COOK. TRACK. GROW.</text>
  </g>
</svg>
